<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booth Info</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main class="shell">
      <section id="unsupported-card" class="panel hidden">
        <div class="empty">BoothMeta タグ付き JSON item を選択してください。</div>
      </section>

      <section id="editor-card" class="panel hidden">
        <section class="group">
          <div class="field">
            <span>Shop Name</span>
            <div id="shop-name-value" class="value"></div>
          </div>

          <div class="field">
            <span>Tags</span>
            <div id="tags-value" class="value value-multiline"></div>
          </div>

          <div class="field">
            <span>Booth item ID</span>
            <div id="booth-item-id-value" class="value"></div>
          </div>

          <div class="field">
            <span>Shop URL</span>
            <a id="shop-url-value" class="value value-link value-break" href="#" target="_blank" rel="noreferrer noopener"></a>
          </div>

          <div class="field">
            <span>Thumbnail URL</span>
            <a id="thumbnail-url-value" class="value value-link value-break" href="#" target="_blank" rel="noreferrer noopener"></a>
          </div>

          <div class="field">
            <span>Shop Thumbnail URL</span>
            <a id="shop-thumbnail-url-value" class="value value-link value-break" href="#" target="_blank" rel="noreferrer noopener"></a>
          </div>

          <div class="field">
            <span>Last Updated</span>
            <div id="last-updated-value" class="value"></div>
          </div>
        </section>
      </section>
    </main>
    <script src="js/plugin.js"></script>
  </body>
</html>
