<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Booth item</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main class="shell">
      <header class="header drag-region">
        <p class="title">Add Booth item</p>
      </header>

      <label class="field no-drag">
        <input id="item-url-input" type="text" placeholder="https://booth.pm/ja/items/1234567" aria-label="Booth item URL">
      </label>

      <div class="button-row no-drag">
        <button id="cancel-button" class="button button-secondary" type="button">Cancel</button>
        <button id="create-button" class="button" type="button">Create</button>
      </div>
    </main>
    <script src="js/plugin.js"></script>
  </body>
</html>
