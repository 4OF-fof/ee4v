<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ee4v BoothMeta Create</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main class="shell">
      <header class="card header">
        <div>
          <p class="eyebrow">ee4v BoothMeta</p>
          <h1>Create BoothMeta JSON</h1>
        </div>
        <button id="reload-button" class="button button-ghost" type="button">Reload</button>
      </header>

      <section class="card">
        <div id="selection-card" class="panel is-empty">folder を 1 つ選択してください。</div>
      </section>

      <section class="card">
        <div class="button-row">
          <button id="create-button" class="button button-primary" type="button">Create</button>
          <button id="open-folder-button" class="button" type="button">Open Folder</button>
        </div>
      </section>

      <footer>
        <div id="status-banner" class="status-banner">Ready.</div>
      </footer>
    </main>
    <script src="js/plugin.js"></script>
  </body>
</html>
